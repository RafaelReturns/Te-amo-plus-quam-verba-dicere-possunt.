            document.getElementById('youtubeAudio').src = "https://www.youtube.com/embed/9w_Yh8A6S70?autoplay=1";
            closePopup();
        });
        document.getElementById('btnNoMusic').addEventListener('click', closePopup);

        function closePopup() {
            document.getElementById('popupOverlay').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('popupOverlay').style.display = 'none'; 
                document.getElementById('clickHint').innerText = "√úr…ôk formalaŇüdńĪrmaq √ľ√ß√ľn ekrana klikl…ôyin...";
            }, 600);
        }

        document.getElementById('halleyComet').addEventListener('click', (e) => {
            e.stopPropagation();
            const msgBox = document.getElementById('cometMsg');
            msgBox.classList.add('show');
            setTimeout(() => { msgBox.classList.remove('show'); }, 5000);
        });

        function getHeartPoint(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return { x: x, y: -y };
        }

        function getSeniSeviremTarget(index) {
            const rows = [
                " SSS  EEEE N   N III   SSS  EEEE V   V III RRRR  EEEE M   M ",
                "S     E    NN  N  I   S     E    V   V  I  R   R E    MM MM ",
                " SSS  EEE  N N N  I    SSS  EEE  V   V  I  RRRR  EEE  M M M ",
                "    S E    N  NN  I       S E     V V   I  R R   E    M   M ",
                "SSSS  EEEE N   N III  SSSS  EEEE   V   III R  R  EEEE M   M "
            ];
            let targetPoints = [];
            const startX = width / 2 - 240;
            const startY = height / 2 - 40; 
            const spacing = 8;

            for (let r = 0; r < rows.length; r++) {
                for (let c = 0; c < rows[r].length; c++) {
                    if (rows[r][c] !== ' ') {
                        targetPoints.push({ x: startX + c * spacing, y: startY + r * 15 });
                    }
                }
            }
            let pt = targetPoints[index % targetPoints.length];
            return { x: pt.x, y: pt.y };
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < numStars; i++) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                
                const t = Math.random() * Math.PI * 2;
                const heartPos = getHeartPoint(t);
                const scale = Math.min(width, height) / 45; 
                
                let heartX, heartY;
                if (i < 700) {
                    const textPos = getSeniSeviremTarget(i);
                    heartX = textPos.x;
                    heartY = textPos.y;
                } else {
                    heartX = width / 2 + heartPos.x * scale;
                    heartY = height / 2 + heartPos.y * scale;
                }

                // UNIVERSE GALAXY DISK: √úr…ôk dańüńĪlandan sonra m…ôtni tam yumru k…ônardan b√ľr√ľy…ôn nizamlńĪ h…ôlq…ô koordinatlarńĪ
                const angle = Math.random() * Math.PI * 2;
                const minRadius = Math.min(width, height) * 0.40; 
                const maxRadius = Math.max(width, height) * 0.70;
                const radius = minRadius + Math.random() * (maxRadius - minRadius);
                
                stars.push({
                    x: x, y: y,
                    heartX: heartX, heartY: heartY,
                    orbitRadius: radius,
                    orbitAngle: angle,
                    orbitSpeed: (Math.random() * 0.002 + 0.0006) * (Math.random() > 0.5 ? 1 : -1),
                    size: Math.random() * 1.2 + 0.3,
                    alpha: Math.random() * 0.6 + 0.2,
                    vx: (Math.random() - 0.5) * 0.25, 
                    vy: (Math.random() - 0.5) * 0.25,
                    isSpiralParticle: false,
                    spiralProgress: 0,
                    targetX: 0, targetY: 0,
                    startRadius: 0, startAngle: 0
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            for (let i = 0; i < stars.length; i++) {
                let s = stars[i];

                if (currentMode === 'scatter') {
                    s.x += s.vx; s.y += s.vy;
                    if (s.x < 0 || s.x > width) s.vx *= -1;
                    if (s.y < 0 || s.y > height) s.vy *= -1;
                } else if (currentMode === 'heart') {
                    s.x += (s.heartX - s.x) * 0.018;
                    s.y += (s.heartY - s.y) * 0.018;
                } else if (currentMode === 'orbit') {
                    // S∆ŹNńįN ńįST∆ŹDńįYńįN: √úr…ôkd…ôn sonra ulduzlarńĪn UNIVERSE kimi nizamlńĪ dair…ôd…ô fńĪrlanmasńĪ
                    s.orbitAngle += s.orbitSpeed;
                    const targetX = width / 2 + Math.cos(s.orbitAngle) * s.orbitRadius;
                    const targetY = height / 2 + Math.sin(s.orbitAngle) * s.orbitRadius;
                    s.x += (targetX - s.x) * 0.025;
                    s.y += (targetY - s.y) * 0.025;
                } else if (currentMode === 'textWrite') {
                    if (s.isSpiralParticle) {
                        // K…ônar kainatdan qopub m…ôrk…ôz…ô spiral Ňü…ôklind…ô axaraq h…ôrfl…ôri yaradan d√ľstur
                        s.spiralProgress += 0.035; 
                        
                        const currentRadius = s.startRadius * (1 - s.spiralProgress);
                        const currentAngle = s.startAngle + s.spiralProgress * Math.PI * 6; // D√∂nm…ô intensivliyi
                        
                        // Real vaxtda h…ôrfin d…ôqiq n√∂qt…ôsin…ô (targetX, targetY) dońüru spiral h…ôr…ôk…ôt
                        s.x = s.targetX + Math.cos(currentAngle) * currentRadius;
                        s.y = s.targetY + Math.sin(currentAngle) * currentRadius;
                        
                        // Tam h…ôrfin √ľst√ľnd…ô birl…ôŇü…ônd…ô parlaqlaŇüńĪr, sonra d…ôrhal s√∂n√ľr
                        if (s.spiralProgress >= 1.0) {
                            s.alpha = 0;
                        }
                    } else {
                        // FondakńĪ kainat (Universe) diski k…ônarda fńĪrlanmańüa v…ô m…ôtni …ôhat…ô etm…ôy…ô davam edir
                        s.orbitAngle += s.orbitSpeed;
                        const targetX = width / 2 + Math.cos(s.orbitAngle) * s.orbitRadius;
                        const targetY = height / 2 + Math.sin(s.orbitAngle) * s.orbitRadius;
                        s.x += (targetX - s.x) * 0.02;
                        s.y += (targetY - s.y) * 0.02;
                    }
                }

                if (s.alpha > 0) {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                    ctx.fill();
                }
            }

            // H…ôrfi yaradńĪb s√∂n…ôn ulduzlarńĪ massivd…ôn tamamil…ô silirik (donma v…ô offset x…ôtasńĪ olmasńĪn dey…ô)
            stars = stars.filter(s => s.alpha > 0);

            requestAnimationFrame(animate);
        }

        function startTypingEffect(container, text, charIndex) {
            if (charIndex >= text.length) return;

            const char = text.charAt(charIndex);
            const span = document.createElement('span');
            
            if (char === '\n') {
                container.appendChild(document.createElement('br'));
            } else {
                span.textContent = char;
                span.className = 'active-letter';
                container.appendChild(span);

                if (char.trim() !== "") {
                    // S√ľr√ľŇüm…ô (scroll) x…ôtasńĪnńĪ tam sńĪfńĪrlayan anlńĪq h…ôrf koordinat metodu
                    const box = span.getBoundingClientRect();
                    const tx = box.left + box.width / 2;
                    const ty = box.top + box.height / 2;

                    // H…ôr h…ôrf yazńĪlanda k…ônardakńĪ kainat h…ôlq…ôsind…ôn 5 ulduz ayrńĪlńĪr v…ô spiral olaraq h…ôrfi yaradńĪr
                    for (let k = 0; k < 5; k++) {
                        const startAngle = Math.random() * Math.PI * 2;
                        // K…ônardakńĪ universe diskinin radiusuna uyńüun olaraq ulduzun trayektoriyasńĪnńĪn baŇülanńüńĪcńĪ
                        const startRadius = Math.min(width, height) * 0.38 + Math.random() * 120;
                        
                        stars.push({
                            x: tx + Math.cos(startAngle) * startRadius,
                            y: ty + Math.sin(startAngle) * startRadius,
                            targetX: tx,
                            targetY: ty,
                            startRadius: startRadius,
                            startAngle: startAngle,
                            spiralProgress: 0,
                            size: Math.random() * 1.5 + 0.4,
                            alpha: 0.9,
                            isSpiralParticle: true
                        });
                    }
                }
            }

            // H…ôrfl…ôr yazńĪldńĪqca qutunu avtomatik aŇüańüńĪ s√ľr√ľŇüd√ľr√ľr
            container.scrollTop = container.scrollHeight;

            setTimeout(() => {
                if (span.className) span.className = '';
                startTypingEffect(container, text, charIndex + 1);
            }, 30);
        }

        window.addEventListener('click', () => {
            if (document.getElementById('popupOverlay').style.display !== 'none') return;

            if (currentMode === 'scatter') {
                currentMode = 'heart';
                document.getElementById('clickHint').innerText = "M…ôtni baŇülatmaq √ľ√ß√ľn ekrana yenid…ôn klikl…ôyin...";
            } else if (currentMode === 'heart') {
                currentMode = 'orbit'; // √úr…ôkd…ôn d…ôrhal sonra UNIVERSE rejimin…ô ke√ßid
                document.getElementById('clickHint').style.display = 'none';
                
                // UlduzlarńĪn tam dair…ôvi kainat diski Ňü…ôklin…ô yńĪńüńĪlmasńĪ √ľ√ß√ľn 2.2 saniy…ô kosmik fasil…ô
                setTimeout(() => {
                    currentMode = 'textWrite';
                    const textBox = document.getElementById('mainTextContent');
                    startTypingEffect(textBox, fullMessage, 0);
                }, 2200); 
            }
        });

        initStars();
        animate();
    </script>
</body>
</html>
