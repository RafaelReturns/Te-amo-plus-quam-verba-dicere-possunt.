 bilm…ôdikl…ôri o sonsuz s…ôs dalńüasńĪdńĪr. D√ľnya nec…ô G√ľn…ôŇüin …ôtrafńĪnda d√∂nm…ôy…ô m…ôhkumdursa, s…ôn d…ô m…ônim daxili kainatńĪmńĪn yegan…ô G√ľn…ôŇüis…ôn. M…ôn ise s…ôni …ôtrafńĪnda fńĪrlanan, s…ônd…ôn iŇüńĪq alan o ki√ßik d√ľnyayam. S…ôn olmasan, m…ôn sonsuz bir qaranlńĪqda, kosmosun o buz kimi soyuq boŇüluńüunda qalaram. ńį√ßimd…ô n…ô bir h…ôyat qalar, n…ô d…ô bir √ľmid. S…ôn m…ôn…ô yaŇüamaq enerjisi verirs…ôn. S…ôn m…ôn…ô yenid…ôn insan olduńüumu, g√ľlm…ôyin, n…ôf…ôs almańüńĪn n…ô q…ôd…ôr g√∂z…ôl bir Ňüey olduńüunu xatńĪrlatdńĪn. M…ôn s…ônd…ôn …ôvv…ôl sad…ôc…ô m√∂vcud idim, s…ôn g…ôldin v…ô m…ôn yaŇüamańüa baŇüladńĪm.\n\nYaxńĪn g…ôl…ôc…ôkd…ô m…ôn xaric…ô ged…ônd…ô, b…ôlk…ô d…ô i√ßind…ô gizli bir narahatlńĪq olacaq. B…ôlk…ô d…ô d√ľŇü√ľn…ôc…ôks…ôn ki, uzaqlńĪq bizi tamamil…ô qoparacaq, m…ôn orada baŇüqalarńĪ il…ô olacam, s…ôni unudacam. Amma s…ôn bu d√ľnyadakńĪ h…ôr Ňüeyd…ôn daha √ßox …ômin ola bil…ôrs…ôn ki, m…ônim g√∂z√ľm s…ônd…ôn baŇüqasńĪnńĪ g√∂rm…ôy…ôc…ôk. √á√ľnki s…ôn m…ônim √ľ√ß√ľn bu d√ľnyadakńĪ qaranlńĪq, azńüńĪn ruhlarńĪn arasńĪnda √∂z t…ômiz iŇüńĪńüńĪ il…ô m…ôn…ô yol g√∂st…ôr…ôn, m…ôni qoruyan yegan…ô m…ôl…ôks…ôn. S…ôn m…ônim √ľ√ß√ľn yer √ľz√ľn…ô 60.000 ild…ô bir d…ôf…ô g…ôl…ôn, hamńĪnńĪn heyranlńĪqla baxdńĪńüńĪ, amma yalnńĪz t…ôk bir n…ôf…ôrin ruhuna toxunan o nadir Halley ulduzu kimis…ôn. V…ô m…ôn o ulduzu h…ôyatńĪmńĪn bu x√ľsusi d√∂n…ômind…ô g√∂rm√ľŇük…ôn, √∂mr√ľm√ľn sonuna q…ôd…ôr g√∂zl…ôrimi ondan ayńĪra bilm…ôr…ôm.\n\nXahiŇü edir…ôm, bu s√∂zl…ôrimi sad…ôc…ô bir dostun anlńĪq emosiyasńĪ kimi oxuyub k…ônara atma. √á√ľnki bu s…ôtirl…ôrin h…ôr bir h…ôrfind…ô m…ônim √ľr…ôyimin d√∂y√ľnt√ľs√ľ, g√∂zl…ôrimin k…ôd…ôri v…ô s…ôn…ô olan sonsuz inamńĪm var. ∆Źg…ôr bu mesajdan sonra m…ôni h…ôyatńĪndan tamamil…ô silm…ôk ist…ôs…ôn bel…ô, bil ki, m…ôn h…ômiŇü…ô s…ônin arxanda, s…ôni uzaqdan da olsa qoruyan v…ô sev…ôn o insan olaraq qalacam. Amma m…ôn inanńĪram ki, bizim hekay…ômiz bel…ô tez v…ô burada bit…ô bilm…ôz. √á√ľnki Halley ulduzu ke√ßdiyi yerd…ô silinm…ôz izl…ôr qoyur v…ô s…ôn m…ônim ruhumda el…ô bir iz qoydun ki, onu n…ô zaman, n…ô d…ô uzaqlńĪqlar sil…ô bil…ôr. S…ôni √ßox sevir…ôm, N…ôrmin. H…ôyatńĪmńĪn m…ônasńĪ, g√ľn…ôŇüim v…ô t…ôk ger√ß…ôyim s…ôns…ôn...\n\nH…ômiŇü…ô s…ôninl…ô v…ô h…ômiŇü…ô s…ôn…ô aid...`;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            if (currentMode === 'scatter' || currentMode === 'orbit') initStars();
        });

        const textBox = document.getElementById('mainTextContent');
        textBox.addEventListener('scroll', () => {
            isUserScrolling = true;
            textBox.classList.add('scrolling-active');
            
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                isUserScrolling = false;
                if (currentMode !== 'textWrite') {
                    textBox.classList.add('scrolling-active');
                } else {
                    textBox.classList.remove('scrolling-active');

        // YENńįLńįK: MP3 faylńĪnńĪ idar…ô ed…ôn hadis…ôl…ôr

        function closePopup() {

        document.getElementById('halleyComet').addEventListener('pointerdown', (e) => {

        function getHeartPoint(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return { x: x, y: -y };
        }

        function getSeniSeviremTarget(index) {
            const rows = [
                " SSS  EEEE N   N III   SSS  EEEE V   V III RRRR  EEEE M   M ",
                "S     E    NN  N  I   S     E    V   V  I  R   R E    MM MM ",
                " SSS  EEE  N N N  I    SSS  EEE  V   V  I  RRRR  EEE  M M M ",
                "    S E    N  NN  I       S E     V V   I  R R   E    M   M ",
                "SSSS  EEEE N   N III  SSSS  EEEE   V   III R  R  EEEE M   M "
            ];
            let targetPoints = [];
            const spacingX = width < 500 ? 4.8 : 7.5;
            const spacingY = width < 500 ? 10 : 14;
            const startX = width / 2 - (rows[0].length * spacingX) / 2;
            const startY = height / 2 - (rows.length * spacingY) / 2; 

            for (let r = 0; r < rows.length; r++) {
                for (let c = 0; c < rows[r].length; c++) {
                    if (rows[r][c] !== ' ') {
                        targetPoints.push({ x: startX + c * spacingX, y: startY + r * spacingY });
                    }
                }
            }
            let pt = targetPoints[index % targetPoints.length];
            return { x: pt.x, y: pt.y };
        }

        function initStars() {
            stars = [];
            const scale = Math.min(width, height) / (width < 500 ? 38 : 45);

            for (let i = 0; i < numStars; i++) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                
                const t = Math.random() * Math.PI * 2;
                const heartPos = getHeartPoint(t);
                
                let heartX, heartY;
                if (i < 450) { 
                    const textPos = getSeniSeviremTarget(i);
                    heartX = textPos.x;
                    heartY = textPos.y;
                } else { 
                    heartX = width / 2 + heartPos.x * scale;
                    heartY = height / 2 + heartPos.y * scale;
                }

                const angle = Math.random() * Math.PI * 2;
                const minRadius = Math.min(width, height) * (width < 500 ? 0.38 : 0.40); 
                const maxRadius = Math.max(width, height) * 0.75;
                const radius = minRadius + Math.random() * (maxRadius - minRadius);
                
                const enhancedOrbitSpeed = (Math.random() * 0.0045 + 0.0015) * (Math.random() > 0.5 ? 1 : -1);

                stars.push({
                    x: x, y: y,
                    heartX: heartX, heartY: heartY,
                    orbitRadius: radius,
                    orbitAngle: angle,
                    orbitSpeed: enhancedOrbitSpeed,
                    size: Math.random() * 0.7 + 0.2, 
                    alpha: Math.random() * 0.5 + 0.2,
                    vx: (Math.random() - 0.5) * 0.5, 
                    vy: (Math.random() - 0.5) * 0.5,
                    isSpiralParticle: false,
                    spiralProgress: 0,
                    targetX: 0, targetY: 0,
                    startRadius: 0, startAngle: 0,
                    originalTargetX: 0, originalTargetY: 0 
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            const currentScroll = textBox.scrollTop; 

            for (let i = 0; i < stars.length; i++) {
                let s = stars[i];

                if (currentMode === 'scatter') {
                    s.x += s.vx; s.y += s.vy;
                    if (s.x < 0 || s.x > width) s.vx *= -1;
                    if (s.y < 0 || s.y > height) s.vy *= -1;
                } else if (currentMode === 'heart') {
                    s.x += (s.heartX - s.x) * 0.0065;
                    s.y += (s.heartY - s.y) * 0.0065;
                } else if (currentMode === 'orbit') {
                    s.orbitAngle += s.orbitSpeed;
                    const targetX = width / 2 + Math.cos(s.orbitAngle) * s.orbitRadius;
                    const targetY = height / 2 + Math.sin(s.orbitAngle) * s.orbitRadius;
                    s.x += (targetX - s.x) * 0.05;
                    s.y += (targetY - s.y) * 0.05;
                } else if (currentMode === 'textWrite') {
                    if (s.isSpiralParticle) {
                        s.spiralProgress += 0.035; 
                        
                        const dynamicTargetY = s.originalTargetY - currentScroll;
                        const currentRadius = s.startRadius * (1 - s.spiralProgress);
                        const currentAngle = s.startAngle + s.spiralProgress * Math.PI * 6; 
                        
                        s.x = s.originalTargetX + Math.cos(currentAngle) * currentRadius;
                        s.y = dynamicTargetY + Math.sin(currentAngle) * currentRadius;
                        
                        if (s.spiralProgress >= 1.0) {
                            s.alpha = 0;
                        }
                    } else {
                        s.orbitAngle += s.orbitSpeed;
                        const targetX = width / 2 + Math.cos(s.orbitAngle) * s.orbitRadius;
                        const targetY = height / 2 + Math.sin(s.orbitAngle) * s.orbitRadius;
                        s.x += (targetX - s.x) * 0.04;
                        s.y += (targetY - s.y) * 0.04;
                    }
                }

                if (s.alpha > 0) {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                    ctx.fill();
                }
            }

            stars = stars.filter(s => s.alpha > 0);
            requestAnimationFrame(animate);
        }

        function startTypingEffect(container, text, charIndex) {
            if (charIndex >= text.length) {
                setTimeout(() => { container.classList.add('scrolling-active'); }, 500);
                return;
            }

            const char = text.charAt(charIndex);
            const span = document.createElement('span');
            
            if (char === '\n') {
                container.appendChild(document.createElement('br'));
            } else {
                span.textContent = char;
                span.className = 'active-letter';
                container.appendChild(span);

                if (char.trim() !== "") {
                    const box = span.getBoundingClientRect();
                    const tx = box.left + box.width / 2;
                    const ty = box.top + box.height / 2;
                    const absoluteTargetY = ty + container.scrollTop;

                    for (let k = 0; k < 3; k++) {
                        const startAngle = Math.random() * Math.PI * 2;
                        const startRadius = Math.min(width, height) * 0.32 + Math.random() * 50;
                        
                        stars.push({
                            x: tx + Math.cos(startAngle) * startRadius,
                            y: ty + Math.sin(startAngle) * startRadius,
                            originalTargetX: tx,
                            originalTargetY: absoluteTargetY, 
                            startRadius: startRadius,
                            startAngle: startAngle,
                            spiralProgress: 0,
                            size: Math.random() * 0.9 + 0.3,
                            alpha: 0.9,
                            isSpiralParticle: true
                        });
                    }
                }
            }

            if (!isUserScrolling) {
                container.scrollTop = container.scrollHeight;
            }

            setTimeout(() => {
                if (span.className) span.className = '';
                startTypingEffect(container, text, charIndex + 1);
            }, 35);
        }

        window.addEventListener('pointerdown', (e) => {
            if (document.getElementById('popupOverlay').style.display !== 'none') return;
            if (e.target.closest('#mainTextContent')) return;

            if (currentMode === 'scatter') {
                currentMode = 'heart';
                document.getElementById('clickHint').innerText = "M…ôtni baŇülatmaq √ľ√ß√ľn ekrana yenid…ôn toxunun...";
            } else if (currentMode === 'heart') {
                currentMode = 'orbit'; 
                document.getElementById('clickHint').style.display = 'none';
                
                setTimeout(() => {
                    currentMode = 'textWrite';
                    startTypingEffect(textBox, fullMessage, 0);
                }, 2200); 
            }
        });

        initStars();
        animate();
    </script>
