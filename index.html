<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nərmin üçün...</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000000;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            touch-action: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Halley Ulduzu */
        .halley-comet {
            position: absolute;
            top: 6%;
            right: 8%;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px 4px #fff;
            cursor: pointer;
            z-index: 5;
            animation: pulseComet 2.5s infinite alternate;
        }
        .halley-comet::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 60px;
            height: 1.5px;
            background: linear-gradient(to right, rgba(255,255,255,0.7), transparent);
            transform: rotate(30deg);
            transform-origin: top left;
        }
        @keyframes pulseComet {
            0% { transform: scale(1); }
            100% { transform: scale(1.3); box-shadow: 0 0 25px 8px rgba(255,255,255,0.8); }
        }

        /* Giriş Popup Pəncərəsi */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.6s ease;
            padding: 20px;
        }
        .popup-box {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px 20px;
            border-radius: 16px;
            text-align: center;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .popup-box h2 {
            font-size: 1.05rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
            color: #f0f0f0;
            line-height: 1.6;
        }
        .popup-btn {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 12px 20px;
            margin: 6px 0;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            display: block;
            width: 100%;
            transition: all 0.3s ease;
        }
        .popup-btn:hover {
            background: #fff;
            color: #000;
        }

        /* Halley Mesajı */
        .comet-message-box {
            position: fixed;
            top: 12%;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 16px;
            border-radius: 10px;
            z-index: 8;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s ease;
            text-align: center;
            font-size: 0.8rem;
            color: #e2ebf5;
            width: 85%;
            max-width: 300px;
        }
        .comet-message-box.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Terminal Mətn Sahəsi */
        .text-overlay-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .text-scroll-box {
            width: 88%;
            max-width: 550px;
            max-height: 55%;
            overflow-y: auto;
            padding: 10px 5px;
            white-space: pre-wrap;
            line-height: 1.75;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.95);
            letter-spacing: 0.3px;
            pointer-events: auto;
            scroll-behavior: smooth;
            transition: -webkit-mask-image 0.4s ease, mask-image 0.4s ease;
            
            /* Yumşaq keçidli vizual maskalama */
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, white 20%, white 80%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, white 20%, white 80%, transparent 100%);
        }

        /* Sürüşdürmə əsnasında maskanın sərt yox olmaması üçün zərif tənzimləmə */
        .text-scroll-box.scrolling-active {
            -webkit-mask-image: linear-gradient(to bottom, rgba(255,255,255,0.3) 0%, white 15%, white 85%, rgba(255,255,255,0.3) 100%);
            mask-image: linear-gradient(to bottom, rgba(255,255,255,0.3) 0%, white 15%, white 85%, rgba(255,255,255,0.3) 100%);
        }

        .text-scroll-box span.active-letter {
            position: relative;
            color: #fff;
            text-shadow: 0 0 8px #fff;
        }
        .text-scroll-box::-webkit-scrollbar { width: 2px; }
        .text-scroll-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }

        .click-hint {
            position: fixed;
            bottom: 6%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            font-size: 0.7rem;
            letter-spacing: 1px;
            pointer-events: none;
            color: rgba(255,255,255,0.35);
            text-align: center;
            width: 90%;
        }
    </style>
</head>
<body>

    <div class="halley-comet" id="halleyComet"></div>
    <div class="click-hint" id="clickHint">Toxunaraq ulduzları hərəkətə gətirin...</div>
    <div class="comet-message-box" id="cometMsg">Haley ulduzu, iki insanların ruhlarını birləşdirən dünyanın ən nadir keçən ulduzu...</div>

    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-box">
            <h2>Bu mahnı bizim mahnımızdır.</h2>
            <button class="popup-btn" id="btnMusic">Mahnı ilə davam et</button>
            <button class="popup-btn" id="btnNoMusic">Mahnısız davam et</button>
        </div>
    </div>

    <div class="text-overlay-container">
        <div class="text-scroll-box" id="mainTextContent"></div>
    </div>

    <canvas id="starCanvas"></canvas>
    <iframe id="youtubeAudio" width="0" height="0" src="" frameborder="0" allow="autoplay"></iframe>

    <script>
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let stars = [];
        const numStars = 1500; 
        let currentMode = 'scatter'; 
        let isUserScrolling = false;
        let scrollTimeout;

        const fullMessage = `Nərmin,\n\nBu saytı sırf sənin üçün yaratdım. Bəlkə də ilk baxışdan çox sadə bir şey kimi görünə bilər, amma içində daşıdığı hisslərin ağırlığı yanında vizual olaraq nə yaratsaydım, yenə də aciz qalacaqdı. Sonradan düşündüm ki, ürəkdən gələn bu sözləri sənə çatdırmaq üçün bəzəkli, süni şoulara heç bir ehtiyac yoxdur. Sənin sadəliyin, sənin o duru zəkan qarşısında ən böyük vizual effektlər belə sönük qalardı. Sənə demək istədiyim, içimdə sən gələndən bəri boğub saxladığım tək bir həqiqət var: Səni sevirəm.\n\nBilirsən, mən həyatımda ilk dəfədir ki, birini belə tam, belə qeyd-şərtsiz sevirəm. Keçmişimdə xoşuma gələn, sadəcə bəyəndiyim insanlar olub, bunu danmıram. Amma Allaha and olsun ki, həyatımda ilk dəfədir bir insana ruhən bağlandığımı, onun yoxluğu ilə yavaş-yavaş yox olduğumu hiss edirəm. Səni öləsiya, nəfəsim kəsilənə qədər sevdim. Bu elə bir sevgidir ki, artıq mənim iradəmdən tamamilə çıxıb. O qədər ağlımdasan, o qədər mənimləsən ki, küçədə, yolda gedərkən belə ətrafımdakı insanları, maşınları görmürəm; sadəcə telefonumu çıxarıb sənin mənə göndərdiyin videolara baxıram. Sənin mənə atdığın səs yazılarını təkrar-təkrar, hər bir vurğusunu, hər bir nəfəsini əzbərləyənə qədər dinləyirəm. Hər saniyə, hər dəqiqə ağlımdasan: görəsən indi nə edir? Yemək yeyibmi? Kefi yerindədirmi? Gülümsəyirmi?\n\nMən indiyə qədər sevgiyə inanmayan bir insan idim. Həmişə elə düşünürdüm ki, sevgi sadəcə kitablarda, filmlərdə olan bir xəyaldır. Özünü bu həyatın sonuna qədər tənha, soyuq və təkbaşına yaşamağa məhkum edilmiş bir ssenarinin qəhrəmanı kimi görürdüm. Ruhumun bu qədər qaranlıq, bu qədər dözülmez olduğunu düşünürdüm. Amma səni tanıyandan sonra mənim içimdəki bütün fəsillər dəyişdi. Sən gəldin və mənim o kimsəsiz, xaraba qalmış ürəyimin ən baş köşəsində əyləşdin. Sən məni dəyişdirdin, Nərmin. Mənim dünyaya baxışımı, insanlara olan soyuqluğumu, özümə olan inamsızlığımı bir anda darmadağın etdin. Bizim tanışlığımızdan ruhun mənə o qədər doğmadır ki, sanki səni həmişə axtarmışam.\n\nMənim Düşüncəmə görə, biz sadəcə təsadüfən qarşılaşmamışıq. Biz bu nəhəng, amansız kainatda Tanrı tərəfindən bir-birimizi tapmaq üçün xüsusi olaraq yaradılmışıq. Sanki ikimiz də fərqli yollarda əvvəlcə sınaqlardan keçdik, yaralandıq, təkliyin acısını daddıq və ruhlarımız tam hazır olanda tale bizi üz-üzə gətirdi. Sən mənim üçün tanıdığım və ən çox sevdiyim yeganə insan oldun. Heç vaxt inanmazdım ki, kimisə bu qədər dərindən, bu qədər ağrılı bir bağlılıqla sevə bilərəm. Amma sən mənə tamamilə ayrı gəldin. Sən bu dünyadakı heç bir qadına, heç bir insana bənzəmirsən. Həyatda ən bərbad günümü yaşayanda, kefim tamamilə olmayanda belə, sadəcə səninlə bir neçə dəqiqə danışmaq mənə bəs edir ki, dünyanın ən xoşbəxt, ən güclü insanına çevrilim. Sənin səsin mənim üçün bütün dərdlərin dərmanıdır. Səni tanıdığım o ilk andan bəri içimdəki o boşluğun necə sürətlə dolduğunu sözlərlə ifadə edə bilmirəm.\n\nBu məktubu, bu sözləri sənə yazmaq üçün günlərlə düşündüm, özümlə mübarizə apardım. Çünki sənin mənə qarşı olan hisslərindən tam əmin deyildim. Mənim haqqımda nə düşündüyünü bilməmək məni daxilən yeyib bitirirdi. Bəlkə də bu mesajdan sonra mənə qəzəblənəcəksən, bəlkə də bir daha mənimlə danışmaq, üzümü görmək istəməyəcəksən. Bu qorxu məni iflic edirdi. Çünki bir neçə gün əvvəl mənə "biz sadəcə dostuq" demişdin. O cümləni dilindən eşitdiyim andan bəri, sənə zahirən büruzə verməsəm də, yavaş-yavaş, içdən-içə ölürəm. Sənin o "dost" kəlmən mənim ürəyimə saplanan ən küt bıçaq oldu. Çünki həmin an səninlə bağlı qurduğum bütün o gözəl xəyallarım, gələcəyə dair ümidlərim bir anda başıma yıxıldı. Heç kimə bu qədər bağlana biləcəyimi təsəvvür etməzdim, amma sən mənə özümü tanıtdın, mənə tam əksini göstərdi. Həyatıma belə sürətlə girib, ürəyimin bütün ritmini dəyişə biləcək başqa bir insan yoxdur.\n\nMən sənin sadəcə zahiri gözəlliyinə vurulmamışam, Nərmin. Mən belə bəsit bir sevgi bəsləmirəm sənə. Mən sənin heyranedici intellektuallığına, fərqli düşüncə tərzinə, dünyaya olan o dərin baxışına və iti zəkana aşiq olmuşam. Səninlə danışanda ruhumun savadlandığını, genişləndiyini hiss edirəm. Amma tam olaraq səni nəyə görə sevdiyimi soruşsan, inan ki, konkret bir cavab verə bilmərəm. Çünki insan birini səbəblərə görə sevirsə, o səbəblər bitəndə sevgi də bitir. Mən ise səni sən olduğun üçün, ruhunun hər bir zərrəsi üçün sevirəm və hisslərimdən adımı bildiyim kimi əminəm. Mənə görə sevgi heç bir sübut, heç bir məntiqi dəlil axtarmır. Əgər mən sənə sevgimi riyazi düsturlarla, sübutlarla bəyan etməyə çalışsam, bu sevginin bütün sehrli tərəfi, magiyası qaçar. Sevgi bir inancdır. Kor-koranə deyil, ruhən olan bir inanc. Və mən bütün qəlbimlə inanıram ki, sənin də içində mənə qarşı, bəlkə də hələ özünə belə etiraf edə bilmədiyin gizli hisslər var. Əsl sevgi üçün illərə ehtiyac yoxdur, sadəcə iki ruhun bir-birini tanıması kifayətdir.\n\nYadındadısa, WhatsApp-da mənə o "cycle" (dövrü) səs effektinin mənasını soruşmuşdun. O vaxt bəlkə də keçişdirdim, amma onun əsl mənası bir-birini dəlicəsinə sevən iki insanların ürəyindən keçən, amma dillərinə gətirə bilmədikləri o sonsuz səs dalğasıdır. Dünya necə Günəşin ətrafında dönməyə məhkumdursa, sən də mənim daxili kainatımın yeganə Günəşisən. Mən ise sənin ətrafında fırlanan, səndən işıq alan o kiçik dünyayam. Sən olmasan, mən sonsuz bir qaranlıqda, kosmosun o buz kimi soyuq boşluğunda qalaram. İçimdə nə bir həyat qalar, nə də bir ümid. Sən mənə yaşamaq enerjisi verirsən. Sən mənə yenidən insan olduğumu, gülməyin, nəfəs almağın nə qədər gözəl bir şey olduğunu xatırlatdın. Mən səndən əvvəl sadəcə mövcud idim, sən gəldin və mən yaşamağa başladım.\n\nYaxın gələkəkdə mən xaricə gedəndə, bəlkə də içində gizli bir narahatlıq olacaq. Bəlkə də düşünəcəksən ki, uzaqlıq bizi tamamilə qoparacak, mən orada başqaları ilə olacam, səni unudacam. Amma sən bu dünyadakı hər şeydən daha çox əmin ola bilərsən ki, mənim gözüm səndən başqasını görməyəcək. Çünki sən mənim üçün bu dünyadakı qaranlıq, azğın ruhların arasında öz təmiz işığı ilə mənə yol göstərən, məni qoruyan yeganə mələksən. Sən mənim üçün yer üzünə 60.000 ildə bir dəfə gələn, hamının heyranlıqla baxdığı, amma yalnız tək bir nəfərin ruhuna toxunan o nadir Halley ulduzu kimisən. Və mən o ulduzu həyatımın bu xüsusi dönəmində görmüşkən, ömrümün sonuna qədər gözlərimi ondan ayıra bilmərəm.\n\nXahiş edirəm, bu sözlərimi sadəcə bir dostun anlıq emosiyası kimi oxuyub kənara atma. Çünki bu sətirlərin hər bir hərfində mənim ürəyimin döyüntüsü, gözlərimin kədəri və sənə olan sonsuz inamım var. Əgər bu mesajdan sonra məni həyatından tamamilə silmək istəsən belə, bil ki, mən həmişə sənin arxanda, səni uzaqdan da olsa qoruyan və sevən o insan olaraq qalacam. Amma mən inanıram ki, bizim hekayəmiz belə tez və burada bitə bilməz. Çünki Halley ulduzu keçdiyi yerdə silinməz izlər qoyur və sən mənim ruhumda elə bir iz qoydun ki, onu nə zaman, nə də uzaqlıqlar silə bilər. Səni çox sevirəm, Nərmin. Həyatımın mənası, günəşim və tək gerçəyim sənsən...\n\nHəmişə səninlə və həmişə sənə aid...`;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            if (currentMode === 'scatter' || currentMode === 'orbit') initStars();
        });

        const textBox = document.getElementById('mainTextContent');
        textBox.addEventListener('scroll', () => {
            isUserScrolling = true;
            textBox.classList.add('scrolling-active');
            
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                isUserScrolling = false;
                // Yazı yazılma prosesi hələ davam edirsə maskanı dərhal qaytarmırıq, bitibsə tam açırıq
                if (currentMode !== 'textWrite') {
                    textBox.classList.add('scrolling-active');
                } else {
                    textBox.classList.remove('scrolling-active');
                }
            }, 2000);
        });

        document.getElementById('btnMusic').addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            document.getElementById('youtubeAudio').src = "https://www.youtube.com/embed/9w_Yh8A6S70?autoplay=1";
            closePopup();
        });
        document.getElementById('btnNoMusic').addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            closePopup();
        });

        function closePopup() {
            document.getElementById('popupOverlay').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('popupOverlay').style.display = 'none'; 
                document.getElementById('clickHint').innerText = "Ürək formalaşdırmaq üçün ekrana toxunun...";
            }, 600);
        }

        document.getElementById('halleyComet').addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            const msgBox = document.getElementById('cometMsg');
            msgBox.classList.add('show');
            setTimeout(() => { msgBox.classList.remove('show'); }, 5000);
        });

        function getHeartPoint(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return { x: x, y: -y };
        }

        function getSeniSeviremTarget(index) {
            const rows = [
                " SSS  EEEE N   N III   SSS  EEEE V   V III RRRR  EEEE M   M ",
                "S     E    NN  N  I   S     E    V   V  I  R   R E    MM MM ",
                " SSS  EEE  N N N  I    SSS  EEE  V   V  I  RRRR  EEE  M M M ",
                "    S E    N  NN  I       S E     V V   I  R R   E    M   M ",
                "SSSS  EEEE N   N III  SSSS  EEEE   V   III R  R  EEEE M   M "
            ];
            let targetPoints = [];
            const spacingX = width < 500 ? 4.8 : 7.5;
            const spacingY = width < 500 ? 10 : 14;
            const startX = width / 2 - (rows[0].length * spacingX) / 2;
            const startY = height / 2 - (rows.length * spacingY) / 2; 

            for (let r = 0; r < rows.length; r++) {
                for (let c = 0; c < rows[r].length; c++) {
                    if (rows[r][c] !== ' ') {
                        targetPoints.push({ x: startX + c * spacingX, y: startY + r * spacingY });
                    }
                }
            }
            let pt = targetPoints[index % targetPoints.length];
            return { x: pt.x, y: pt.y };
        }

        function initStars() {
            stars = [];
            const scale = Math.min(width, height) / (width < 500 ? 38 : 45);

            for (let i = 0; i < numStars; i++) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                
                const t = Math.random() * Math.PI * 2;
                const heartPos = getHeartPoint(t);
                
                let heartX, heartY;
                if (i < 450) { 
                    const textPos = getSeniSeviremTarget(i);
                    heartX = textPos.x;
                    heartY = textPos.y;
                } else { 
                    heartX = width / 2 + heartPos.x * scale;
                    heartY = height / 2 + heartPos.y * scale;
                }

                const angle = Math.random() * Math.PI * 2;
                const minRadius = Math.min(width, height) * (width < 500 ? 0.38 : 0.40); 
                const maxRadius = Math.max(width, height) * 0.75;
                const radius = minRadius + Math.random() * (maxRadius - minRadius);
                
                stars.push({
                    x: x, y: y,
                    heartX: heartX, heartY: heartY,
                    orbitRadius: radius,
                    orbitAngle: angle,
                    orbitSpeed: (Math.random() * 0.0018 + 0.0005) * (Math.random() > 0.5 ? 1 : -1),
                    size: Math.random() * 0.7 + 0.2, 
                    alpha: Math.random() * 0.5 + 0.2,
                    vx: (Math.random() - 0.5) * 0.25, 
                    vy: (Math.random() - 0.5) * 0.25,
                    isSpiralParticle: false,
                    spiralProgress: 0,
                    targetX: 0, targetY: 0,
                    startRadius: 0, startAngle: 0,
                    // Scroll sinxronizasiyası üçün hərfin mətn daxilindəki ana koordinat yaddaşı
                    originalTargetX: 0, originalTargetY: 0 
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            const currentScroll = textBox.scrollTop; // Mətnin o anki sürüşmə miqdarı (dinamik)

            for (let i = 0; i < stars.length; i++) {
                let s = stars[i];

                if (currentMode === 'scatter') {
                    s.x += s.vx; s.y += s.vy;
                    if (s.x < 0 || s.x > width) s.vx *= -1;
                    if (s.y < 0 || s.y > height) s.vy *= -1;
                } else if (currentMode === 'heart') {
                    s.x += (s.heartX - s.x) * 0.0065;
                    s.y += (s.heartY - s.y) * 0.0065;
                } else if (currentMode === 'orbit') {
                    s.orbitAngle += s.orbitSpeed;
                    const targetX = width / 2 + Math.cos(s.orbitAngle) * s.orbitRadius;
                    const targetY = height / 2 + Math.sin(s.orbitAngle) * s.orbitRadius;
                    s.x += (targetX - s.x) * 0.025;
                    s.y += (targetY - s.y) * 0.025;
                } else if (currentMode === 'textWrite') {
                    if (s.isSpiralParticle) {
                        s.spiralProgress += 0.035; 
                        
                        // CRITICAL FIX: Sürüşmə anında hərfin yeni real nöqtəsini hesablayırıq
                        const dynamicTargetY = s.originalTargetY - currentScroll;
                        const currentRadius = s.startRadius * (1 - s.spiralProgress);
                        const currentAngle = s.startAngle + s.spiralProgress * Math.PI * 6; 
                        
                        s.x = s.originalTargetX + Math.cos(currentAngle) * currentRadius;
                        s.y = dynamicTargetY + Math.sin(currentAngle) * currentRadius;
                        
                        if (s.spiralProgress >= 1.0) {
                            s.alpha = 0;
                        }
                    } else {
                        s.orbitAngle += s.orbitSpeed;
                        const targetX = width / 2 + Math.cos(s.orbitAngle) * s.orbitRadius;
                        const targetY = height / 2 + Math.sin(s.orbitAngle) * s.orbitRadius;
                        s.x += (targetX - s.x) * 0.02;
                        s.y += (targetY - s.y) * 0.02;
                    }
                }

                if (s.alpha > 0) {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                    ctx.fill();
                }
            }

            stars = stars.filter(s => s.alpha > 0);
            requestAnimationFrame(animate);
        }

        function startTypingEffect(container, text, charIndex) {
            if (charIndex >= text.length) {
                setTimeout(() => { container.classList.add('scrolling-active'); }, 500);
                return;
            }

            const char = text.charAt(charIndex);
            const span = document.createElement('span');
            
            if (char === '\n') {
                container.appendChild(document.createElement('br'));
            } else {
                span.textContent = char;
                span.className = 'active-letter';
                container.appendChild(span);

                if (char.trim() !== "") {
                    const box = span.getBoundingClientRect();
                    const tx = box.left + box.width / 2;
                    // Hərfin o anki scroll vəziyyətinə görə mütləq (sabit) koordinatını hesablayıb yaddaşa veririk
                    const ty = box.top + box.height / 2;
                    const absoluteTargetY = ty + container.scrollTop;

                    for (let k = 0; k < 3; k++) {
                        const startAngle = Math.random() * Math.PI * 2;
                        const startRadius = Math.min(width, height) * 0.32 + Math.random() * 50;
                        
                        stars.push({
                            x: tx + Math.cos(startAngle) * startRadius,
                            y: ty + Math.sin(startAngle) * startRadius,
                            originalTargetX: tx,
                            originalTargetY: absoluteTargetY, // Mətn daxilindəki tam nöqtəsi
                            startRadius: startRadius,
                            startAngle: startAngle,
                            spiralProgress: 0,
                            size: Math.random() * 0.9 + 0.3,
                            alpha: 0.9,
                            isSpiralParticle: true
                        });
                    }
                }
            }

            if (!isUserScrolling) {
                container.scrollTop = container.scrollHeight;
            }

            setTimeout(() => {
                if (span.className) span.className = '';
                startTypingEffect(container, text, charIndex + 1);
            }, 35);
        }

        window.addEventListener('pointerdown', (e) => {
            if (document.getElementById('popupOverlay').style.display !== 'none') return;
            if (e.target.closest('#mainTextContent')) return;

            if (currentMode === 'scatter') {
                currentMode = 'heart';
                document.getElementById('clickHint').innerText = "Mətni başlatmaq üçün ekrana yenidən toxunun...";
            } else if (currentMode === 'heart') {
                currentMode = 'orbit'; 
                document.getElementById('clickHint').style.display = 'none';
                
                setTimeout(() => {
                    currentMode = 'textWrite';
                    startTypingEffect(textBox, fullMessage, 0);
                }, 2200); 
            }
        });

        initStars();
        animate();
    </script>
</body>
</html>
