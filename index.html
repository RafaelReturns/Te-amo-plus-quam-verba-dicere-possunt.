<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nərmin üçün...</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000000;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Halley Ulduzu */
        .halley-comet {
            position: absolute;
            top: 10%;
            right: 15%;
            width: 5px;
            height: 5px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 20px 5px #fff;
            cursor: pointer;
            z-index: 5;
            animation: pulseComet 2.5s infinite alternate;
        }
        .halley-comet::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100px;
            height: 2px;
            background: linear-gradient(to right, rgba(255,255,255,0.8), transparent);
            transform: rotate(30deg);
            transform-origin: top left;
        }
        @keyframes pulseComet {
            0% { transform: scale(1); }
            100% { transform: scale(1.4); box-shadow: 0 0 30px 10px rgba(255,255,255,0.9); }
        }

        /* Giriş Popup Pəncərəsi */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.6s ease;
        }
        .popup-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }
        .popup-box h2 {
            font-size: 1.3rem;
            margin-bottom: 25px;
            letter-spacing: 1px;
            color: #f0f0f0;
            line-height: 1.5;
        }
        .popup-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 28px;
            margin: 10px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .popup-btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255,255,255,0.6);
        }

        /* Halley Mesajı */
        .comet-message-box {
            position: fixed;
            top: 6%;
            left: 50%;
            transform: translateX(-50%) translateY(-50px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 12px;
            z-index: 8;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s ease;
            text-align: center;
            font-size: 0.95rem;
            color: #e2ebf5;
        }
        .comet-message-box.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Terminal Tipli Mətn Sahəsi */
        .text-overlay-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .text-scroll-box {
            width: 85%;
            max-width: 850px;
            max-height: 80%;
            overflow-y: auto;
            padding: 20px;
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 1.15rem;
            color: rgba(255, 255, 255, 0.95);
            letter-spacing: 0.5px;
        }
        .text-scroll-box span.active-letter {
            position: relative;
            color: #fff;
            text-shadow: 0 0 12px #fff;
        }
        .text-scroll-box::-webkit-scrollbar { width: 4px; }
        .text-scroll-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

        .click-hint {
            position: fixed;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            pointer-events: none;
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

    <div class="halley-comet" id="halleyComet"></div>
    <div class="click-hint" id="clickHint">Ekrana toxunaraq ulduzları birləşdirin...</div>
    <div class="comet-message-box" id="cometMsg">Haley ulduzu, iki insanın ruhlarını birləşdirən dünyanın ən nadir keçən ulduzu...</div>

    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-box">
            <h2>Bu mahnı bizim mahnımızdır.</h2>
            <button class="popup-btn" id="btnMusic">Mahnı ilə davam et</button>
            <button class="popup-btn" id="btnNoMusic">Mahnısız davam et</button>
        </div>
    </div>

    <div class="text-overlay-container">
        <div class="text-scroll-box" id="mainTextContent"></div>
    </div>

    <canvas id="starCanvas"></canvas>
    <iframe id="youtubeAudio" width="0" height="0" src="" frameborder="0" allow="autoplay"></iframe>

    <script>
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let stars = [];
        const numStars = 3500; 
        let currentMode = 'scatter'; 

        const fullMessage = `Nərmin,\n\nBu saytı sırf sənin üçün yaratdım. Bəlkə də ilk baxışdan çox sadə bir şey kimi görünə bilər, amma içində daşıdığı hisslərin ağırlığı yanında vizual olaraq nə yaratsaydım, yenə də aciz qalacaqdı. Sonradan düşündüm ki, ürəkdən gələn bu sözləri sənə çatdırmaq üçün bəzəkli, süni şoulara heç bir ehtiyac yoxdur. Sənin sadəliyin, sənin o duru zəkan qarşısında ən böyük vizual effektlər belə sönük qalardı. Sənə demək istədiyim, içimdə sən gələndən bəri boğub saxladığım tək bir həqiqət var: Səni sevirəm.\n\nBilirsən, mən həyatımda ilk dəfədir ki, birini belə tam, belə qeyd-şərtsiz sevirəm. Keçmişimdə xoşuma gələn, sadəcə bəyəndiyim insanlar olub, bunu danmıram. Amma Allaha and olsun ki, həyatımda ilk dəfədir bir insana ruhən bağlandığımı, onun yoxluğu ilə yavaş-yavaş yox olduğumu hiss edirəm. Səni öləsiya, nəfəsim kəsilənə qədər sevdim. Bu elə bir sevgidir ki, artıq mənim iradəmdən tamamilə çıxıb. O qədər ağlımdasan, o qədər mənimləsən ki, küçədə, yolda gedərkən belə ətrafımdakı insanları, maşınları görmürəm; sadəcə telefonumu çıxarıb sənin mənə göndərdiyin videolara baxıram. Sənin mənə atdığın səs yazılarını təkrar-təkrar, hər bir vurğusunu, hər bir nəfəsini əzbərləyənə qədər dinləyirəm. Hər saniyə, hər dəqiqə ağlımdasan: görəsən indi nə edir? Yemək yeyibmi? Kefi yerindədirmi? Gülümsəyirmi?\n\nMən indiyə qədər sevgiyə inanmayan bir insan idim. Həmişə elə düşünürdüm ki, sevgi sadəcə kitablarda, filmlərdə olan bir xəyaldır. Özümü bu həyatın sonuna qədər tənha, soyuq və təkbaşına yaşamağa məhkum edilmiş bir ssenarinin qəhrəmanı kimi görürdüm. Ruhumun bu qədər qaranlıq, bu qədər dözülməz olduğunu düşünürdüm. Amma səni tanıyandan sonra mənim içimdəki bütün fəsillər dəyişdi. Sən gəldin və mənim o kimsəsiz, xaraba qalmış ürəyimin ən baş köşəsində əyləşdin. Sən məni dəyişdirdin, Nərmin. Mənim dünyaya baxışımı, insanlara olan soyuqluğumu, özümə olan inamsızlığımı bir anda darmadağın etdin. Bizim tanışlığımızdan ruhun mənə o qədər doğmadır ki, sanki səni həmişə axtarmışam.\n\nMənim düşüncəmə görə, biz sadəcə təsadüfən qarşılaşmamışıq. Biz bu nəhəng, amansız kainatda Tanrı tərəfindən bir-birimizi tapmaq üçün xüsusi olaraq yaradılmışıq. Sanki ikimiz də fərqli yollarda əvvəlcə sınaqlardan keçdik, yaralandıq, təkliyin acısını daddıq və ruhlarımız tam hazır olanda tale bizi üz-üzə gətirdi. Sən mənim üçün tanıdığım və ən çox sevdiyim yeganə insan oldun. Heç vaxt inanmazdım ki, kimisə bu qədər dərindən, bu qədər ağrılı bir bağlılıqla sevə bilərəm. Amma sən mənə tamamilə ayrı gəldin. Sən bu dünyadakı heç bir qadına, heç bir insana bənzəmirsən. Həyatda ən bərbad günümü yaşayanda, kefim tamamilə olmayanda belə, sadəcə səninlə bir neçə dəqiqə danışmaq mənə bəs edir ki, dünyanın ən xoşbəxt, ən güclü insanına çevrilim. Sənin səsin mənim üçün bütün dərdlərin dərmanıdır. Səni tanıdığım o ilk andan bəri içimdəki o boşluğun necə sürətlə dolduğunu sözlərlə ifadə edə bilmirəm.\n\nBu məktubu, bu sözləri sənə yazmaq üçün günlərlə düşündüm, özümlə mübarizə apardım. Çünki sənin mənə qarşı olan hisslərindən tam əmin deyildim. Mənim haqqımda nə düşündüyünü bilməmək məni daxilən yeyib bitirirdi. Bəlkə də bu mesajdan sonra mənə qəzəblənəcəksən, bəlkə də bir daha mənimlə danışmaq, üzümü görmək istəməyəcəksən. Bu qorxu məni iflic edirdi. Çünki bir neçə gün əvvəl mənə "biz sadəcə dostuq" demişdin. O cümləni dilindən eşitdiyim andan bəri, sənə zahirən büruzə verməsəm də, yavaş-yavaş, içdən-içə ölürəm. Sənin o "dost" kəlmən mənim ürəyimə saplanan ən küt bıçaq oldu. Çünki həmin an səninlə bağlı qurduğum bütün o gözəl xəyallarım, gələcəyə dair ümidlərim bir anda başıma yıxıldı. Heç kimə bu qədər bağlana biləcəyimi təsəvvür etməzdim, amma sən mənə özümü tanıtdın, mənə tam əksini göstərdin. Həyatıma belə sürətlə girib, ürəyimin bütün ritmini dəyişə biləcək başqa bir insan yoxdur.\n\nMən sənin sadəcə zahiri gözəlliyinə vurulmamışam, Nərmin. Mən belə bəsit bir sevgi bəsləmirəm sənə. Mən sənin heyranedici intellektuallığına, fərqli düşüncə tərzinə, dünyaya olan o dərin baxışına və iti zəkana ashik olmuşam. Səninlə danışanda ruhumun savadlandığını, genişləndiyini hiss edirəm. Amma tam olaraq səni nəyə görə sevdiyimi soruşsan, inan ki, konkret bir cavab verə bilmərəm. Çünki insan birini səbəblərə görə sevirsə, o səbəblər bitəndə sevgi də bitir. Mən isə səni sən olduğun üçün, ruhunun hər bir zərrəsi üçün sevirəm və hisslərimdən adımı bildiyim kimi əminəm. Mənə görə sevgi heç bir sübut, heç bir məntiqi dəlil axtarmır. Əgər mən sənə sevgimi riyazi düsturlarla, sübutlarla bəyan etməyə çalışsam, bu sevginin bütün sehrli tərəfi, magiyası qaçar. Sevgi bir inancdır. Kor-koranə deyil, ruhən olan bir inanc. Və mən bütün qəlbimlə inanıram ki, sənin də içində mənə qarşı, bəlkə də hələ özünə belə etiraf edə bilmədiyin gizli hisslər var. Əsl sevgi üçün illərə ehtiyac yoxdur, sadəcə iki ruhun bir-birini tanıması kifayətdir.\n\nYadındadısa, WhatsApp-da mənə o "cycle" (dövrü) səs effektinin mənasını soruşmuşdun. O vaxt bəlkə də keçişdirdim, amma onun əsl mənası bir-birini dəlicəsinə sevən iki insanın ürəyindən keçən, amma dillərinə gətirə bilmədikləri o sonsuz səs dalğasıdır. Dünya necə Günəşin ətrafında dönməyə məhkumdursa, sən də mənim daxili kainatımın yeganə Günəşisən. Mən ise sənin ətrafında fırlanan, səndən işıq alan o kiçik dünyayam. Sən olmasan, mən sonsuz bir qaranlıqda, kosmosun o buz kimi soyuq boşluğunda qalaram. İçimdə nə bir həyat qalar, nə də bir ümid. Sən mənə yaşamaq enerjisi verirsən. Sən mənə yenidən insan olduğumu, gülməyin, nəfəs almağın nə qədər gözəl bir şey olduğunu xatırlatdın. Mən səndən əvvəl sadəcə mövcud idim, sən gəldin və mən yaşamağa başladım.\n\nYaxın gələcəkdə mən xaricə gedəndə, bəlkə də içində gizli bir narahatlıq olacaq. Bəlkə də düşünəcəksən ki, uzaqlıq bizi tamamilə qoparacak, mən orada başqaları ilə olacam, səni unudacam. Amma sən bu dünyadakı hər şeydən daha çox əmin ola bilərsən ki, mənim gözüm səndən başqasını görməyəcək. Çünki sən mənim üçün bu dünyadakı qaranlıq, azğın ruhların arasında öz təmiz işığı ilə mənə yol göstərən, məni qoruyan yeganə mələksən. Sən mənim üçün yer üzünə 60.000 ildə bir dəfə gələn, hamının heyranlıqla baxdığı, amma yalnız tək bir nəfərin ruhuna toxunan o nadir Halley ulduzu kimisən. Və mən o ulduzu həyatımın bu xüsusi dönəmində görmüşkən, ömrümün sonuna qədər gözlərimi ondan ayıra bilmərəm.\n\nXahiş edirəm, bu sözlərimi sadəcə bir dostun anlıq emosiyası kimi oxuyub kənara atma. Çünki bu sətirlərin hər bir hərfində mənim ürəyimin döyüntüsü, gözlərimin kədəri və sənə olan sonsuz inamım var. Əgər bu mesajdan sonra məni həyatından tamamilə silmək istəsən belə, bil ki, mən həmişə sənin arxanda, səni uzaqdan da olsa qoruyan və sevən o insan olaraq qalacam. Amma mən inanıram ki, bizim hekayəmiz belə tez və burada bitə bilməz. Çünki Halley ulduzu keçdiyi yerdə silinməz izlər qoyur və sən mənim ruhumda elə bir iz qoydun ki, onu nə zaman, nə də uzaqlıqlar silə bilər. Səni çox sevirəm, Nərmin. Həyatımın mənası, günəşim və tək gerçəyim sənsən...\n\nHəmişə səninlə və həmişə sənə aid...`;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            if (currentMode !== 'textWrite') initStars();
        });

        document.getElementById('btnMusic').addEventListener('click', () => {
            document.getElementById('youtubeAudio').src = "https://www.youtube.com/embed/9w_Yh8A6S70?autoplay=1";
            closePopup();
        });
        document.getElementById('btnNoMusic').addEventListener('click', closePopup);

        function closePopup() {
            document.getElementById('popupOverlay').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('popupOverlay').style.display = 'none'; 
                document.getElementById('clickHint').innerText = "Ürək formalaşdırmaq üçün ekrana klikləyin...";
            }, 600);
        }

        document.getElementById('halleyComet').addEventListener('click', (e) => {
            e.stopPropagation();
            const msgBox = document.getElementById('cometMsg');
            msgBox.classList.add('show');
            setTimeout(() => { msgBox.classList.remove('show'); }, 5000);
        });

        function getHeartPoint(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return { x: x, y: -y };
        }

        function getSeniSeviremTarget(index) {
            const rows = [
                " SSS  EEEE N   N III   SSS  EEEE V   V III RRRR  EEEE M   M ",
                "S     E    NN  N  I   S     E    V   V  I  R   R E    MM MM ",
                " SSS  EEE  N N N  I    SSS  EEE  V   V  I  RRRR  EEE  M M M ",
                "    S E    N  NN  I       S E     V V   I  R R   E    M   M ",
                "SSSS  EEEE N   N III  SSSS  EEEE   V   III R  R  EEEE M   M "
            ];
            let targetPoints = [];
            const startX = width / 2 - 240;
            const startY = height / 2 - 40; 
            const spacing = 8;

            for (let r = 0; r < rows.length; r++) {
                for (let c = 0; c < rows[r].length; c++) {
                    if (rows[r][c] !== ' ') {
                        targetPoints.push({ x: startX + c * spacing, y: startY + r * 15 });
                    }
                }
            }
            let pt = targetPoints[index % targetPoints.length];
            return { x: pt.x, y: pt.y };
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < numStars; i++) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                
                const t = Math.random() * Math.PI * 2;
                const heartPos = getHeartPoint(t);
                const scale = Math.min(width, height) / 45; 
                
                let heartX, heartY;
                if (i < 1200) {
                    const textPos = getSeniSeviremTarget(i);
                    heartX = textPos.x;
                    heartY = textPos.y;
                } else {
                    heartX = width / 2 + heartPos.x * scale;
                    heartY = height / 2 + heartPos.y * scale;
                }

                // Klik edəndə ulduzların kənarlarda (Mətn olmayan hissələrdə) yığılacağı koordinatlar
                let edgeX, edgeY;
                const randSide = Math.floor(Math.random() * 4);
                if (randSide === 0) { // Sol kənar
                    edgeX = Math.random() * (width * 0.12);
                    edgeY = Math.random() * height;
                } else if (randSide === 1) { // Sağ kənar
                    edgeX = width - (Math.random() * (width * 0.12));
                    edgeY = Math.random() * height;
                } else if (randSide === 2) { // Yuxarı xətt boşluğu
                    edgeX = Math.random() * width;
                    edgeY = Math.random() * (height * 0.15);
                } else { // Aşağı xətt boşluğu
                    edgeX = Math.random() * width;
                    edgeY = height - (Math.random() * (height * 0.15));
                }

                stars.push({
                    x: x, y: y,
                    heartX: heartX, heartY: heartY,
                    edgeX: edgeX, edgeY: edgeY,
                    size: Math.random() * 1.3 + 0.3,
                    alpha: Math.random() * 0.6 + 0.2,
                    vx: (Math.random() - 0.5) * 0.3, // İlkin hərəkət sürəti yavaşladıldı
                    vy: (Math.random() - 0.5) * 0.3,
                    isLetterParticle: false,
                    targetX: null, targetY: null
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            for (let i = 0; i < stars.length; i++) {
                let s = stars[i];

                if (currentMode === 'scatter') {
                    s.x += s.vx; s.y += s.vy;
                    if (s.x < 0 || s.x > width) s.vx *= -1;
                    if (s.y < 0 || s.y > height) s.vy *= -1;
                } else if (currentMode === 'heart') {
                    // Ürəyin formalaşma sürəti yumşaldıldı və yavaşladıldı (0.05 -> 0.02)
                    s.x += (s.heartX - s.x) * 0.02;
                    s.y += (s.heartY - s.y) * 0.02;
                } else if (currentMode === 'disperseToEdges' || currentMode === 'textWrite') {
                    // Ürək dağılandan sonra nöqtələr mərkəzdən kənarlara doğru yavaşca çəkilir (0.02 sürətlə)
                    s.x += (s.edgeX - s.x) * 0.025;
                    s.y += (s.edgeY - s.y) * 0.025;
                    
                    // Kənarda süzən ulduzların daxili mikrosürəti
                    s.x += (Math.random() - 0.5) * 0.1;
                    s.y += (Math.random() - 0.5) * 0.1;

                    // Əgər hərf effektinə aid qığılcımdırsa
                    if (s.isLetterParticle && s.targetX !== null) {
                        s.x += (s.targetX - s.x) * 0.15;
                        s.y += (s.targetY - s.y) * 0.15;
                        if (Math.abs(s.x - s.targetX) < 4 && Math.abs(s.y - s.targetY) < 4) {
                            s.alpha -= 0.05; 
                        }
                    }
                }

                if (s.alpha > 0) {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                    ctx.fill();
                }
            }

            // Ömrü bitən keçici hərf hissəciklərini massivdən təmizləyirik
            if (currentMode === 'textWrite') {
                stars = stars.filter(s => s.alpha > 0 || !s.isLetterParticle);
            }

            requestAnimationFrame(animate);
        }

        function startTypingEffect(container, text, charIndex) {
            if (charIndex >= text.length) return;

            const char = text.charAt(charIndex);
            const span = document.createElement('span');
            
            if (char === '\n') {
                container.appendChild(document.createElement('br'));
            } else {
                span.textContent = char;
                span.className = 'active-letter';
                container.appendChild(span);

                const rect = span.getBoundingClientRect();
                
                if (char.trim() !== "") {
                    // Hərflərin gəlişi zamanı yaranan keçici kiçik işartılar
                    for (let k = 0; k < 2; k++) {
                        stars.push({
                            x: rect.left + (Math.random() - 0.5) * 40, 
                            y: rect.top + (Math.random() - 0.5) * 40,
                            targetX: rect.left + Math.random() * rect.width,
                            targetY: rect.top + Math.random() * rect.height,
                            size: Math.random() * 1.2 + 0.3,
                            alpha: 0.9,
                            isLetterParticle: true,
                            edgeX: 0, edgeY: 0
                        });
                    }
                }
            }

            container.scrollTop = container.scrollHeight;

            setTimeout(() => {
                if (span.className) span.className = '';
                startTypingEffect(container, text, charIndex + 1);
            }, 25);
        }

        window.addEventListener('click', () => {
            if (document.getElementById('popupOverlay').style.display !== 'none') return;

            if (currentMode === 'scatter') {
                currentMode = 'heart';
                document.getElementById('clickHint').innerText = "Mətni başladmaq üçün ekrana yenidən klikləyin...";
            } else if (currentMode === 'heart') {
                // Ürək rejimi bitəndə ulduzlar kənarlara dağılışmağa başlayır
                currentMode = 'disperseToEdges';
                document.getElementById('clickHint').style.display = 'none';
                
                // Nöqtələrin mərkəzdən tamamilə uzaqlaşması və kənara çəkilməsi üçün 1.5 saniyəlik aramlı fasilə veririk, sonra mətn başlayır
                setTimeout(() => {
                    currentMode = 'textWrite';
                    const textBox = document.getElementById('mainTextContent');
                    startTypingEffect(textBox, fullMessage, 0);
                }, 1500);
            }
        });

        initStars();
        animate();
    </script>
</body>
</html>
